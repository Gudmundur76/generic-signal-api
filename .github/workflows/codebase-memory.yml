name: codebase-memory

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  index:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install codebase-memory-mcp
        run: |
          curl -fsSL https://raw.githubusercontent.com/DeusData/codebase-memory-mcp/main/install.sh \
            -o /tmp/cbm-install.sh
          bash /tmp/cbm-install.sh --skip-config
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Index repository
        run: |
          codebase-memory-mcp cli index_repository \
            '{"repo_path":"${{ github.workspace }}","mode":"full"}'

      - name: Export graph snapshot
        run: |
          mkdir -p .codebase-memory
          PROJECT="$(echo '${{ github.workspace }}' | tr '/' '-' | sed 's/^-//')"
          DB="$HOME/.cache/codebase-memory-mcp/${PROJECT}.db"
          if [ ! -f "$DB" ]; then
            # fallback: find the most recently modified db
            DB="$(ls -t $HOME/.cache/codebase-memory-mcp/*.db 2>/dev/null | head -1)"
          fi
          gzip -c "$DB" > .codebase-memory/graph.db.gz
          NODES=$(codebase-memory-mcp cli list_projects '{}' 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); p=[x for x in d['projects'] if '${{ github.repository }}' in x['name'] or x['root_path']=='${{ github.workspace }}']; print(p[0]['nodes'] if p else 'unknown')" 2>/dev/null || echo "unknown")
          EDGES=$(codebase-memory-mcp cli list_projects '{}' 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); p=[x for x in d['projects'] if '${{ github.repository }}' in x['name'] or x['root_path']=='${{ github.workspace }}']; print(p[0]['edges'] if p else 'unknown')" 2>/dev/null || echo "unknown")
          cat > .codebase-memory/README.md << EOF
          # Codebase Memory Graph
          Knowledge graph of \`${{ github.repository }}\` generated by [codebase-memory-mcp](https://deusdata.github.io/codebase-memory-mcp/) v0.8.1.
          | Metric | Value |
          |---|---|
          | Nodes | ${NODES} |
          | Edges | ${EDGES} |
          | Last indexed | $(date -u +%Y-%m-%d) |
          ## Bootstrap in a new session
          \`\`\`bash
          curl -fsSL https://raw.githubusercontent.com/DeusData/codebase-memory-mcp/main/install.sh | bash
          export PATH="\$HOME/.local/bin:\$PATH"
          mkdir -p ~/.cache/codebase-memory-mcp
          gunzip -c .codebase-memory/graph.db.gz > ~/.cache/codebase-memory-mcp/${{ github.repository_owner }}-${{ github.event.repository.name }}.db
          codebase-memory-mcp cli index_status '{"project":"${{ github.repository_owner }}-${{ github.event.repository.name }}"}'
          \`\`\`
          EOF

      - name: Commit graph snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .codebase-memory/
          git diff --staged --quiet || git commit -m "chore: update codebase-memory graph [skip ci]"
          git push
